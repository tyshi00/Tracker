name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GPR_TOKEN }}
      GH_PACKAGES_USER: ${{ github.actor }}
      GH_PACKAGES_TOKEN: ${{ secrets.GPR_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Point Gradle at the Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :tool:assembleDebug --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tool-debug-apk
          path: tool/build/outputs/apk/debug/tool-debug.apk
